<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clean synthetic demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f5f7fb;
    }
    main {
      width: min(100%, 1080px);
      margin: 0 auto;
      min-height: 100vh;
      padding: 32px 20px;
      display: grid;
      align-content: center;
      gap: 20px;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 20px;
      align-items: start;
    }
    .panel {
      padding: 24px;
      border: 1px solid #dfe7f2;
      border-radius: 8px;
      background: white;
    }
    h1 { margin: 0 0 12px; font-size: 40px; line-height: 1.05; letter-spacing: 0; }
    p { margin: 0; color: #526071; line-height: 1.6; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
    button, a.button {
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid #1d4ed8;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      text-decoration: none;
    }
    button { background: #1d4ed8; color: white; }
    a.button { background: white; color: #1d4ed8; }
    ul { margin: 0; padding-left: 20px; color: #526071; line-height: 1.7; }
    @media (max-width: 760px) {
      .hero { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="panel">
        <h1>Clean synthetic demo</h1>
        <p>A small responsive page with labeled controls, readable text, and no placeholder links.</p>
        <div class="actions">
          <button type="button">Run audit</button>
          <a class="button" href="/docs">Open docs</a>
        </div>
      </div>
      <aside class="panel" aria-label="Checklist">
        <ul>
          <li>Desktop and mobile layouts fit the viewport.</li>
          <li>Controls have visible labels.</li>
          <li>Links are real paths, not placeholders.</li>
        </ul>
      </aside>
    </section>
  </main>
</body>
</html>
